name: Publish MCP server

# Publishes @swapwizard/mcp-server to npm (Trusted Publishing / OIDC) and the
# server to the MCP Registry (GitHub OIDC) on every v* tag. No stored secrets:
# both registries trust the workflow's OIDC identity.
#
# One-time setup on npmjs.com (package @swapwizard/mcp-server → Settings →
# Trusted Publisher): GitHub Actions, org DeFiRe-business, repo swapwizard-mcp,
# workflow publish-mcp.yml, no environment.

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write # OIDC token for npm Trusted Publishing + MCP Registry
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # npm Trusted Publishing requires npm >= 11.5.1
      - name: Update npm
        run: npm install -g npm@latest

      - name: Check versions match the tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          SRV=$(node -p "require('./server.json').version")
          SRVPKG=$(node -p "require('./server.json').packages[0].version")
          if [ "$TAG" != "$PKG" ] || [ "$TAG" != "$SRV" ] || [ "$TAG" != "$SRVPKG" ]; then
            echo "Tag v$TAG does not match package.json ($PKG) or server.json ($SRV / $SRVPKG)" >&2
            exit 1
          fi

      - run: npm ci

      - run: npm run build

      - name: Publish to npm
        run: |
          PKG=$(node -p "require('./package.json').version")
          if npm view "@swapwizard/mcp-server@$PKG" version >/dev/null 2>&1; then
            echo "npm already has $PKG — skipping npm publish"
          else
            npm publish
          fi

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m).tar.gz" | tar xz mcp-publisher

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
